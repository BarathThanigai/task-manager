<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Manager - Login</title>
  <link rel="stylesheet" href="/static/css/styles.css" />
</head>
<body>
  <main class="page">
    <section class="panel auth-shell">
      <div class="auth-copy">
        <p class="eyebrow">Simple and reliable</p>
        <h1>Task Manager</h1>
        <p class="subtitle">Log in to manage your tasks, track progress, and keep everything in one place.</p>
        <div class="feature-list">
          <span>JWT auth</span>
          <span>PostgreSQL backed</span>
          <span>Fast task updates</span>
        </div>
      </div>

      <form id="login-form" class="card auth-card">
        <h2>Login</h2>
        <input name="username" id="login-username" type="text" placeholder="Username" required />
        <input name="password" id="login-password" type="password" placeholder="Password" required />
        <button id="login-button" type="button">Login</button>
        <p class="switch-link">Don't have an account? <a href="/static/register.html">Register</a></p>
      </form>

      <p id="message-box" class="message"></p>
    </section>
  </main>
  <script src="/static/js/app.js" defer></script>
</body>
</html>
